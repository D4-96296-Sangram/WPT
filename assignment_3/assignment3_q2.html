<!DOCTYPE html>
<html>
<head>
    <title>Our Products</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: white;
            width: 200px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 5px gray;
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }

        .price {
            color: orange;
            font-weight: bold;
        }

        .btn {
            background: green;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: darkgreen;
        }
    </style>

</head>

<body>

<h2>Our Products</h2>

<div class="container">

    <div class="card">
        <img src="dell_laptop.webp" alt="Product 1">
        <h4>Product 1</h4>
        <p>High-quality product that meets your needs.</p>
        <p class="price">$805.08</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="handbag.jfif" alt="Product 2">
        <h4>Product 2</h4>
        <p>Excellent craftsmanship and durable design.</p>
        <p class="price">$11.50</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="keyboard_mouse.webp" alt="Product 3">
        <h4>Product 3</h4>
        <p>Reliable and affordable choice for everyone.</p>
        <p class="price">$12.00</p>
        <button class="btn">Add to Cart</button>
    </div>

</div>

</body>
</html>
