<!DOCTYPE html>
<html>
<head>
    <title>Basic Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        table {
            border: 1px solid black;
            padding: 15px;
            border-spacing: 10px;
        }
        h1 {
            text-decoration: underline;
        }
        input {
            border: 1px solid black;
            padding: 5px;
            width: 150px;
        }
        button {
            cursor: pointer;
            padding: 8px 12px;
            margin: 2px;
            border-radius: 8px;
            border: 1px solid black;
            background-color: white;
        }
        button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1><u>Calculator</u></h1>

    <table>
        <tr>
            <td><label>Enter Number 1</label></td>
            <td><input type="number" id="n1"></td>
        </tr>
        <tr>
            <td><label>Enter Number 2</label></td>
            <td><input type="number" id="n2"></td>
        </tr>
        <tr>
            <td><label>Result</label></td>
            <td><input type="text" id="res" readonly></td>
        </tr>
        <tr>
            <td colspan="2" style="text-align: center;">
                <button onclick="calculate('+')">Addition</button>
                <button onclick="calculate('-')">Subtraction</button>
                <button onclick="calculate('*')">Multiplication</button>
                <button onclick="calculate('/')">Division</button>
            </td>
        </tr>
    </table>

    <script src="q2.js"></script>
</body>
</html>
