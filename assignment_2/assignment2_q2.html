<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table layout</title>
</head>
<body>
    <table border="2" width="500px">
        <caption>table layout structure</caption>
            <tr>
                <td align="center" colspan="5">A</td>
            </tr>
            <tr>
                <td align="center" colspan="3" rowspan="2">B</td>
                <td align="center" colspan="2">C</td>
            </tr>
            <tr>
                <td align="center">D</td>
                <td align="center">E</td>
            </tr>

            <tr>
                <td align="center" rowspan="3">F</td>
                <td align="center" colspan="4">G</td>
            </tr>
            <tr>
                <td align="center" rowspan="2">H</td>
                <td align="center" rowspan="2">I</td>
                <td align="center" colspan="2">J</td>
            </tr>
            <tr>
                <td align="center" colspan="2">K</td>
            </tr>
            <tr>
                <td align="center" colspan="4" rowspan="2">L</td>
                <td align="center">M</td>
            </tr>
            <tr>
                <td align="center">N</td>
            </tr>
    </table>
    
</body>
</html>
