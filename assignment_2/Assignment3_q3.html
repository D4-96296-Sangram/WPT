<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h1 align="center"> <img src="sunbeam logo.PNG"></h1>
    <h2 align="center">Sunbeam Registration Form</h1>
    <form action="">
        <table cellpadding="5" cellspacing="5"align="center">
            <tr>
                <td rowspan="13">
                  <iframe width="560" height="315" src="https://www.youtube.com/embed/02q9aAVv1NI?si=TWtzNDg2-SnPZ5Kr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen=""></iframe>
                </td>
                <td>name</td>
                <td>:<input type="text" name="user_name" placeholder="enter your name"></td>
            </tr>
            <tr>
                <td>birth date</td>
                <td>:<input type="date" name=DOB" placeholder="enter DOB"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td>:<input type="email" placeholder="enter mail id"></td>
            </tr>
            <tr>
                <td>password</td>
                <td>:<input type="password" name="password" placeholder="enter password"></td>
            </tr>
            <tr>
                <td valign="top">Address </td>
                <td>:<textarea name="address" rows="3" placeholder="enter your adress" ></textarea></td>
            </tr>
            <tr>
                <td><label >Gender</label></td>
                <td>:
                    <input type="radio" name="Gender">M
                    <input type="radio" name="Gender" value="F">F
                </td>
               
            </tr>
            <tr>
                <td><label >upload photo</label></td>
                <td>:<input type="file" name="profile pic" accept="/img"></td>
            </tr>
            <tr>
                <td><label >select your course</label></td>
                <td >:
                    <select>
                        <option value="">select course</option>
                        <option value="DAC">DAC</option>
                        <option value="DBDA">DBDA</option>
                        <option value="ESD">ESD</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label >Skill Set</label></td>
                <td>:
                    <input type="checkbox" value="java">Java
                    <input type="checkbox" value="CPP">CPP
                    <input type="checkbox" value="OS">OS

                </td>
            </tr>
            <tr>
                <td></td>
                <td>:
                    <input type="submit" name="register" >
                    <input type="reset" name="clear" >
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
